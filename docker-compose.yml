version: "3.9"
# =============================================================================
# Port architecture:
#   - App (Next.js) listens on port 8081 inside its container
#   - Host port 8081 is mapped for direct access / debugging
#   - Caddy (in the same Docker network) proxies to app:8081 internally
#   - Caddy exposes 80 (ACME + HTTP→HTTPS redirect) and 443 (HTTPS)
#   - DOMAIN and EMAIL are read from the .env file (auto-generated by install.sh)
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wahl-check-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8081
      - NEXT_PUBLIC_APP_URL=https://${DOMAIN:-localhost}
    volumes:
      # Content files are mounted read-only so they can be updated without rebuild
      - ./content:/app/content:ro
      - analytics_data:/data
    ports:
      # Exposed on host for direct access and health checks.
      # Public traffic goes through Caddy on 443.
      - "${APP_PORT:-8081}:8081"
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: wahl-check-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      # Injected from .env file (generated by install.sh on the server)
      - CADDY_DOMAIN=${DOMAIN:-localhost}
      - CADDY_EMAIL=${EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
  analytics_data:

networks:
  web:
    driver: bridge
