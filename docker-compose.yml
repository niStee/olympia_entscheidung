version: "3.9"
# =============================================================================
# Port architecture:
#   - App (Next.js) listens on port 8081 inside its container
#   - Host port 8081 is bound to localhost only for health checks / admin debugging
#   - Caddy (in the same Docker network) proxies to app:8081 internally
#   - Caddy exposes 80 (ACME + HTTP→HTTPS redirect) and 443 (HTTPS)
#   - DOMAIN and EMAIL are read from the .env file (auto-generated by install.sh)
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "${PROJECT_NAME:-wahl-check}-app"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8081
      - NEXT_PUBLIC_APP_URL=https://${DOMAIN:-localhost}
      - INTERNAL_STATS_ENABLED=${INTERNAL_STATS_ENABLED:-false}
    volumes:
      # Content files are mounted read-only so they can be updated without rebuild
      - ./apps/olympia/content:/app/content:ro
      - ${HOST_DATA_DIR:-/data}:/data
    ports:
      # Bound to localhost only. Public traffic goes through Caddy on 443.
      - "127.0.0.1:${APP_PORT:-8081}:8081"
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  info:
    build:
      context: .
      dockerfile: Dockerfile.info
      args:
        QUIZ_URL: ${QUIZ_URL:-https://${DOMAIN:-localhost}}
    container_name: "${PROJECT_NAME:-wahl-check}-info"
    restart: unless-stopped
    ports:
      - "127.0.0.1:${INFO_PORT:-8083}:80"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: "${PROJECT_NAME:-wahl-check}-caddy"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      # Injected from .env file (generated by install.sh on the server)
      - CADDY_DOMAIN=${DOMAIN:-localhost}
      - CADDY_INFO_DOMAIN=${INFO_DOMAIN:-volt.${DOMAIN:-localhost}}
      - CADDY_EMAIL=${EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - app
      - info

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
